# configs/data_config.yaml
# ---------------------------------------------------------------------------
# Data pipeline configuration for the UIEB underwater image enhancement project.
# All paths are relative to the project root unless they start with "/".
# ---------------------------------------------------------------------------

dataset:
  name: UIEB
  root_dir: "dataset/UIEB"
  raw_subdir: "raw"           # degraded input images
  reference_subdir: "reference" # clean ground-truth images
  image_extensions: [".jpg", ".jpeg", ".png", ".bmp", ".tif", ".tiff"]

splits:
  train: 0.70
  val: 0.15
  test: 0.15
  seed: 42                    # fixed seed for reproducibility
  stratified: false           # set true if you add scene-type metadata

loader:
  batch_size: 16
  num_workers: 12              
  pin_memory: true
  persistent_workers: true    # keep workers alive between epochs
  prefetch_factor: 4

preprocessing:
  image_size: [384, 384]      # [height, width] — resize target
  normalize:
    mean: [0.485, 0.456, 0.406]   # ImageNet stats (fine starting point)
    std:  [0.229, 0.224, 0.225]

augmentation:
  train:
    random_horizontal_flip: true
    random_vertical_flip: false
    random_rotation:
      enabled: true
      degrees: 15
    color_jitter:
      enabled: true
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.05
    random_crop:
      enabled: false           # set true to crop patches instead of resize
      size: [224, 224]
    gaussian_blur:
      enabled: false
      kernel_size: 3
      sigma: [0.1, 2.0]
  val:
    # validation: deterministic — only resize + normalize
  test:
    # test: deterministic — only resize + normalize

cache:
  enabled: true
  max_size_gb: 20